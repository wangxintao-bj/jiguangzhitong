    <script>
    // Force chatbot button to top
    (function(){
      function setBtnTop(){
        var btns = document.querySelectorAll('button');
        for(var i=0;i<btns.length;i++){
          var b = btns[i];
          if(b.getAttribute('aria-label')==='Open AI Chat'){
            b.style.position='fixed';
            b.style.top='20px';
            b.style.left=(window.innerWidth-80)+'px';
            b.style.zIndex='9999';
            break;
          }
        }
      }
      // Try immediately
      setBtnTop();
      // Also try after DOM ready
      if(document.readyState==='loading'){
        document.addEventListener('DOMContentLoaded', setBtnTop);
      }
      // Also keep trying for 5 seconds (React may mount late)
      var tries=0;
      var timer = setInterval(function(){
        tries++;
        setBtnTop();
        if(tries>20) clearInterval(timer);
      }, 250);
    })();
