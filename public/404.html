<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北京集光智通科技有限公司</title>
  <script>
    // SPA fallback: redirect all 404s to index.html
    sessionStorage.redirect = location.pathname + location.search + location.hash;
  </script>
  <meta http-equiv="refresh" content="0;url=./">
</head>
<body>
  <script>
    // If the redirect meta didn't work (some crawlers don't support it),
    // try JS redirect as well
    window.location.replace('./');
  </script>
</body>
</html>
