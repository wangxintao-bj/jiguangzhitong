    <linearGradient id="jgzt-shine" x1="80" y1="60" x2="180" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BAE6FD" stop-opacity="0.3" />
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0.05" />
    </linearGradient>
    <!-- 底部光效 -->
