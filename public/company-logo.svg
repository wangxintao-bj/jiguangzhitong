<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- J+G 外壳 - 高级渐变，从深蓝到清亮 -->
    <linearGradient id="jgzt-shell" x1="30" y1="20" x2="230" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" />
      <stop offset="0.35" stop-color="#2DD4BF" />
      <stop offset="0.65" stop-color="#22C55E" />
      <stop offset="1" stop-color="#16A34A" />
    </linearGradient>
    <!-- 外壳表面高光质感 -->
    <linearGradient id="jgzt-shine" x1="50" y1="30" x2="210" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="0.3" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="0.7" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08" />
    </linearGradient>
    <!-- 环状光晕 -->
    <linearGradient id="jgzt-ring" x1="50" y1="50" x2="210" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.25" />
      <stop offset="0.5" stop-color="#22C55E" stop-opacity="0.12" />
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.03" />
    </linearGradient>
  </defs>

  <!-- 背景深色底 -->
  <circle cx="128" cy="128" r="96" fill="#0F172A" opacity="0.75" />
  <circle cx="128" cy="128" r="90" fill="none" stroke="url(#jgzt-ring)" stroke-width="4" />

  <!-- J+G 外壳主体 -->
  <path d="M67 42C92 22 125 14 159 19C193 24 223 43 239 73V93H221V78C207 54 183 38 155 33C127 28 98 33 75 49C52 65 37 91 33 119C29 147 36 176 53 199C70 222 96 237 124 241C152 245 181 238 204 222C217 213 228 201 236 187V154H218V136H257V191C248 210 235 227 218 239C191 259 157 268 123 264C89 260 58 245 36 220C14 195 4 162 8 128C12 94 30 62 57 43L67 42Z" fill="url(#jgzt-shell)" />
  <circle cx="223" cy="119" r="14" fill="url(#jgzt-shell)" />
  <rect x="218" y="136" width="22" height="46" rx="8" fill="url(#jgzt-shell)" />

  <!-- 外壳表面高光质感层 -->
  <path d="M67 42C92 22 125 14 159 19C193 24 223 43 239 73V93H221V78C207 54 183 38 155 33C127 28 98 33 75 49C52 65 37 91 33 119C29 147 36 176 53 199C70 222 96 237 124 241C152 245 181 238 204 222C217 213 228 201 236 187V154H218V136H257V191C248 210 235 227 218 239C191 259 157 268 123 264C89 260 58 245 36 220C14 195 4 162 8 128C12 94 30 62 57 43L67 42Z" fill="url(#jgzt-shine)" />
  <circle cx="223" cy="119" r="14" fill="url(#jgzt-shine)" />
  <rect x="218" y="136" width="22" height="46" rx="8" fill="url(#jgzt-shine)" />

  <!-- Z+T 公路 - 低调的深色底上浮现微光纹理 -->
  <path d="M57 96C90 96 112 108 144 117C165 123 182 126 186 137C189 146 176 154 158 162C143 168 132 175 132 182C132 188 141 193 152 197L195 212C175 225 152 231 127 230C97 229 70 215 53 193L66 186L132 156L87 168L83 159L145 134L120 129L70 146C63 130 61 112 64 95L57 96Z" fill="#0A1628" />
  <path d="M85 163C100 154 119 145 143 136C167 127 179 120 179 111C179 103 167 96 145 89L93 73C105 69 117 67 129 67C150 67 170 73 186 86V175L121 160C117 159 114 161 112 164C110 168 112 172 116 174L141 185C104 174 83 168 76 167L85 163Z" fill="#0A1628" />

  <!-- Z 字形蜿蜒公路 - 低调的丝滑线条 -->
  <path d="M64 95C90 98 112 108 144 117C165 123 182 126 186 137C189 146 176 154 158 162C143 168 132 175 132 182C132 188 141 193 152 197L195 212" 
        fill="none" stroke="#2DD4BF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" />

  <!-- T 横向连接线 -->
  <path d="M96 184L130 197" stroke="#22C55E" stroke-width="4" stroke-linecap="round" opacity="0.25" />
  <path d="M136 199L162 206" stroke="#22C55E" stroke-width="4" stroke-linecap="round" opacity="0.25" />
  <path d="M170 208L196 216" stroke="#22C55E" stroke-width="4" stroke-linecap="round" opacity="0.25" />
</svg>
